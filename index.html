<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control de Gastos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <form id="expense-form">
      <p id="error-message"></p>

      <input type="text" id="gasto" name="gasto" placeholder="Ingrese el gasto" />
      <input type="number" id="monto" name="monto" placeholder="Ingrese el monto" />
      <input type="text" id="categoria" name="categoria" placeholder="Ingrese la categoria" />
      <input type="date" name="fecha" id="fecha" />

      <button type="submit" class="btn">Enviar</button>
    </form>
    <section>
      <h2 class="title">Gastos cargados:</h2>
      <p id="empty-message">No hay gastos cargados todavía.</p>
      <div id="expenses-list"></div>
      <section>
        <h2 class="title">Total gastado</h2>
        <p id="total" class="price">$0</p>
        <button id="clear-btn" class="clear-btn">Borrar todo</button>
      </section>
    </section>
    <script src="main.js"></script>
  </body>
</html>
